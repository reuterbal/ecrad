---
### Bundle

name    : ecrad-bundle
version : 0.0.0
cmake   : >
    CMAKE_LINK_DEPENDS_NO_SHARED=ON
    ENABLE_FIELD_API=ON
    ENABLE_OMP=ON
    ENABLE_DOUBLE_PRECISION=ON
    ENABLE_SINGLE_PRECISION=OFF
    ENABLE_ACC=OFF
    ENABLE_CUDA=OFF
    ENABLE_NVTX=OFF
    ENABLE_LOKI=OFF
    ENABLE_BITIDENTITY_TESTING=OFF
    ENABLE_MPI=OFF

projects :

    - ecbuild :
        git     : https://github.com/ecmwf/ecbuild
        version : master
        bundle  : false

    - fiat :
        git     : https://github.com/ecmwf-ifs/fiat
        version : main

    - field_api :
        git      : https://github.com/ecmwf-ifs/field_api.git
        version  : main
        optional : true
        require  : fiat
        cmake    : >
            ENABLE_SINGLE_PRECISION=OFF
            ENABLE_DOUBLE_PRECISION=ON
            ENABLE_TESTS=OFF

    - loki :
        git      : https://github.com/ecmwf-ifs/loki
        version  : je-ecrad-offload-local-array-promote
        optional : true
        require  : ecbuild
        cmake    : >
            LOKI_ENABLE_TESTS=OFF
            LOKI_ENABLE_NO_INSTALL=OFF

    - ecrad :
        dir     : $ECRAD_SOURCE_DIR
        require : fiat

options :

    - with-single-precision :
        help  : Enable single precision build of ecRad
        cmake : ENABLE_SINGLE_PRECISION=ON

    - without-double-precision :
        help  : Disable double precision build of ecRad
        cmake : ENABLE_DOUBLE_PRECISION=OFF

    - without-mpi :
        help  : Disable MPI
        cmake : ENABLE_MPI=OFF

    - without-omp :
        help  : Disable OpenMP
        cmake : ENABLE_OMP=OFF

    - with-field-api :
        help  : Enable Field API based driver variants
        cmake : ENABLE_FIELD_API=ON

    - without-field-api :
        help  : Disable Field API based driver variants
        cmake : ENABLE_FIELD_API=OFF

    - with-loki :
        help  : Enable Loki source-to-source transformations
        cmake : >
            ENABLE_LOKI=ON
            LOKI_ENABLE_NO_INSTALL=OFF

    - without-loki :
        help  : Disable Loki source-to-source transformations
        cmake : ENABLE_LOKI=OFF

    - with-acc :
        help  : Enable GPU offload using OpenACC
        cmake : ENABLE_ACC=ON

    - with-cuda :
        help  : Enable Field API CUDA backend
        cmake : ENABLE_CUDA=ON

    - with-nvtx :
        help  : Enable NVTX markers in ecRad
        cmake : ENABLE_NVTX=ON

    - with-bitidentity-testing :
        help  : Enable bit-identity testing mode
        cmake : ENABLE_BITIDENTITY_TESTING=ON

    - without-loki-install :
        help  : Skip installation of Loki (requires Loki on PATH)
        cmake : >
            LOKI_ENABLE_NO_INSTALL=ON
            LOKI_ENABLE_CLAW=OFF

    - loki-mode :
        help  : Choose Loki transformation mode (defaults to scc)
        cmake : LOKI_MODE={{value}}

    - with-static-linking :
        help  : Build static libraries by default
        cmake : BUILD_SHARED_LIBS=OFF
